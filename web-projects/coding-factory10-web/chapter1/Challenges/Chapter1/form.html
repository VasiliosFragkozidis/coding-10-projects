<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <h1>Αίτηση Συμμετοχής</h1>
    <h2>Προσωπικά Στοιχεία</h2>

    <form>
            <p>
                <label for="fldFullname">Ονοματεπώνυμο:</label> 
                <input type="text" name="fullname" id="fldFullname" placeholder="Full Name">
                
                <label for="fldFathername">Πατρώνυμο:</label>
                <input type="text" name="fathername" id="fldFathername"
                placeholder="Father Name">
            </p>

            <h2>Στοιχεία Κατοικίας</h2>

            <p>
                <label for="fldAddress">Διεύθυνση Κατοικίας:</label>
                <input type="text" name="address" id="fldAddress" placeholder="Address">

                <label for="fldAddressNumber">Αριθμός:</label>
                <input type="text" name="addressnumber" id="d=fldAddressNumber"
                placeholder="AdressNumber">

                <label for="fldZipCode">TK:</label>
                <input type="text" name="zipcode" id="fldZipCode"
                placeholder="ZipCode">

            </p>

            <h2>Στοιχεία Επικοινωνίας</h2>


            <p>
                <label for="fldPhoneNumber">Αριθμός Τηλεφώνου:</label> 
                <input type="text" name="phonenumber" id="fldPhoneNumber" placeholder="Phone Number">
        
            </p>
    </form>
</body>
</html>
